services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb-container
    image: mariadb:inception
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress-container
    image: wordpress:inception
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis: 
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "php-fpm8.2", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build: ./requirements/nginx
    container_name: nginx-container
    image: nginx:inception
    env_file:
      - .env
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always

  redis:
    build: ./requirements/bonus/redis/
    container_name: redis-container
    image: redis:inception
    networks:
      - inception
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp-container
    image: ftp:inception
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    env_file:
      - .env
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always
  
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer-container
    image: adminer:inception
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - inception
    restart: on-failure

  static_site:
    build: ./requirements/bonus/static-site
    container_name: static_site-container
    image: static_site:inception
    ports:
      - "8081:80"
    networks:
      - inception
    restart: on-failure

  portainer:
    build: ./requirements/bonus/portainer
    container_name: portainer-container
    image: portainer:inception
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - inception
    restart: on-failure


volumes:
    mariadb_data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/mait-all/data/mariadb
    wordpress_data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/mait-all/data/wordpress
    portainer_data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: /home/mait-all/data/portainer

networks:
    inception:
        driver: bridge